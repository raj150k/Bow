<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Letter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffdce5;
    overflow:hidden;
    position:relative;
}

/* Floating Hearts */

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
}

.hearts span{
    position:absolute;
    bottom:-100px;
    font-size:25px;
    animation:heartMove 10s linear infinite;
    opacity:0.7;
}

.hearts span:nth-child(1){left:10%; animation-duration:8s;}
.hearts span:nth-child(2){left:25%; animation-duration:10s;}
.hearts span:nth-child(3){left:40%; animation-duration:7s;}
.hearts span:nth-child(4){left:60%; animation-duration:12s;}
.hearts span:nth-child(5){left:80%; animation-duration:9s;}

@keyframes heartMove{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(-110vh) rotate(360deg);
        opacity:0;
    }
}

/* Main Box */

.letter-window{
    width:360px;
    background:#fff0f4;
    border:6px solid #ff7aa2;
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    position:relative;
    z-index:2;
}

/* Top */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar h2{
    color:#ff2e63;
    font-size:28px;
}

.top-icons{
    color:#ff2e63;
    font-size:22px;
}

/* Title */

#letter-title{
    text-align:center;
    color:#ff2e63;
    font-size:30px;
    margin-bottom:10px;
    line-height:1.5;
}

.sub{
    text-align:center;
    color:#c94f7c;
    font-size:22px;
    margin-bottom:20px;
}

/* Cat */

.cat{
    width:170px;
    display:block;
    margin:0 auto 20px;
    border-radius:15px;
}

/* Buttons */

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    position:relative;
    height:100px;
}

.btn{
    border:none;
    padding:14px 28px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    color:white;
    position:relative;
}

/* YES */

.yes-btn{
    background:#ff2e63;
    z-index:5;
}

/* NO */

.no-btn{
    background:#999;
    z-index:10;
    transition:
    transform 0.35s ease,
    background 0.35s ease,
    box-shadow 0.35s ease;
}

/* Glow Animation */

.no-btn.glow-left{
    box-shadow:-25px 0 35px #ff2e63;
}

.no-btn.glow-right{
    box-shadow:25px 0 35px #ff2e63;
}

.no-btn.glow-top{
    box-shadow:0 -25px 35px #ff2e63;
}

.no-btn.glow-bottom{
    box-shadow:0 25px 35px #ff2e63;
}

/* Final Text */

.final-text{
    display:none;
    text-align:center;
    margin-top:25px;
    font-size:32px;
    color:#ff0055;
    animation:pop 0.5s ease;
    font-weight:bold;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<!-- Hearts -->

<div class="hearts">
    <span>💖</span>
    <span>💕</span>
    <span>💘</span>
    <span>💝</span>
    <span>❤️</span>
</div>

<!-- Main -->

<div class="letter-window">

    <div class="top-bar">
        <h2>LOVE</h2>
        <div class="top-icons">♡ ♡ ♡</div>
    </div>

    <h1 id="letter-title">
        তুমি কি আমার রাজ্যের <br>
        রানি হবে মেড়াম ?
    </h1>

    <div class="sub">
        (ans: yes / no)
    </div>

    <!-- Cat GIF -->

    <img
    src="https://media.tenor.com/4N7bJQ1K0McAAAAi/cute-cat.gif"
    class="cat"
    alt="Cute Cat">

    <!-- Buttons -->

    <div class="buttons">

        <button class="btn yes-btn" id="yesBtn">
            YES
        </button>

        <button class="btn no-btn" id="noBtn">
            NO
        </button>

    </div>

    <!-- Final -->

    <div class="final-text" id="finalText">
        I Love You বউ জানু ❤️
    </div>

</div>

<script>

/* ELEMENTS */

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const finalText = document.getElementById("finalText");

/* YES BUTTON */

yesBtn.onclick = () => {

    /* Show Love Text */
    finalText.style.display = "block";

    /* Hide Buttons */
    yesBtn.style.display = "none";
    noBtn.style.display = "none";
};

/* NO BUTTON MOVE */

function moveButton(){

    const maxX = 120;
    const maxY = 60;

    let x =
    Math.floor(Math.random() * (maxX * 2))
    - maxX;

    let y =
    Math.floor(Math.random() * (maxY * 2))
    - maxY;

    /* Prevent overlap on YES button */

    if(x < 50 && x > -50){
        x = x < 0 ? -90 : 90;
    }

    /* Remove old glow */

    noBtn.classList.remove(
        "glow-left",
        "glow-right",
        "glow-top",
        "glow-bottom"
    );

    /* Opposite Side Glow */

    if(x > 0){
        noBtn.classList.add("glow-left");
    }else{
        noBtn.classList.add("glow-right");
    }

    if(y > 0){
        noBtn.classList.add("glow-top");
    }else{
        noBtn.classList.add("glow-bottom");
    }

    noBtn.style.transform =
    `translate(${x}px, ${y}px)`;
}

/* PC */

noBtn.addEventListener(
    "mouseover",
    moveButton
);

/* MOBILE */

noBtn.addEventListener(
    "touchstart",
    moveButton
);

</script>

</body>
      </html>
